<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propilot — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #0f0f11;
  --surface:       #141416;
  --border:        #222226;
  --border-2:      #2e2e33;
  --text-1:        #e4e4e7;
  --text-2:        #a1a1aa;
  --text-3:        #71717a;
  --text-4:        #3f3f46;
  --accent:        #22d3ee;
  --accent-dim:    rgba(34,211,238,0.10);
  --accent-border: rgba(34,211,238,0.28);
  --red:           #ef4444;
  --red-dim:       rgba(239,68,68,0.08);
  --red-border:    rgba(239,68,68,0.25);
  --r:             6px;
  --t:             150ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

.login-wrap {
  width: 100%; max-width: 340px;
  padding: 24px;
  animation: pageIn 220ms ease both;
}

.logo {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 28px; justify-content: center;
}
.logo-mark {
  width: 32px; height: 32px; background: #18181b;
  border: 1px solid #2e2e33; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 18px; height: 18px; }
.logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.logo-text .lt-w { color: var(--text-1); }
.logo-text .lt-c { color: var(--accent); }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
}

.login-title {
  font-size: 15px; font-weight: 600; color: var(--text-1);
  margin-bottom: 4px;
}
.login-sub {
  font-size: 12px; color: var(--text-3);
  margin-bottom: 20px;
}

.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-3); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 5px;
}
.field input[type="text"],
.field input[type="password"] {
  width: 100%; height: 36px;
  background: var(--bg); border: 1px solid var(--border-2);
  border-radius: var(--r); padding: 0 10px;
  font-size: 13px; color: var(--text-1);
  font-family: 'Inter', sans-serif;
  outline: none; transition: border-color var(--t);
}
.field input:focus { border-color: var(--accent); }

.remember-row {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 18px;
}
.remember-row input[type="checkbox"] {
  width: 14px; height: 14px;
  accent-color: var(--accent);
  cursor: pointer;
}
.remember-row label {
  font-size: 12px; color: var(--text-3); cursor: pointer;
}

.login-btn {
  width: 100%; height: 36px;
  background: var(--accent); border: none;
  border-radius: var(--r); cursor: pointer;
  font-size: 13px; font-weight: 600;
  color: #0f0f11; font-family: 'Inter', sans-serif;
  transition: opacity var(--t);
}
.login-btn:hover { opacity: 0.88; }

.error-msg {
  background: var(--red-dim); border: 1px solid var(--red-border);
  border-radius: var(--r); padding: 8px 10px;
  font-size: 12px; color: var(--red);
  margin-bottom: 14px;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M17.5 9.5L3 4.5v4l5 1.5-5 1.5v4l14.5-5c.33-.11.33-.89 0-1z" fill="#22d3ee"/>
      </svg>
    </div>
    <div class="logo-text"><span class="lt-w">Prop</span><span class="lt-c">ilot</span></div>
  </div>

  <div class="login-card">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Access your Propilot dashboard</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>
      <button class="login-btn" type="submit">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
