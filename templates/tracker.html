<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propilot — Bet Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #0f0f11;
  --surface:       #141416;
  --surface-2:     #18181b;
  --border:        #222226;
  --border-2:      #2e2e33;
  --text-1:        #e4e4e7;
  --text-2:        #a1a1aa;
  --text-3:        #71717a;
  --text-4:        #3f3f46;
  --accent:        #22d3ee;
  --accent-dim:    rgba(34,211,238,0.10);
  --accent-border: rgba(34,211,238,0.28);
  --green:         #22c55e;
  --green-dim:     rgba(34,197,94,0.10);
  --green-border:  rgba(34,197,94,0.25);
  --red:           #ef4444;
  --red-dim:       rgba(239,68,68,0.10);
  --red-border:    rgba(239,68,68,0.25);
  --amber:         #f59e0b;
  --pp:            #7c3aed;
  --pp-border:     rgba(124,58,237,0.38);
  --pp-glow:       rgba(124,58,237,0.13);
  --ud:            #d97706;
  --ud-border:     rgba(217,119,6,0.38);
  --ud-glow:       rgba(217,119,6,0.12);
  --r:             6px;
  --r-sm:          4px;
  --t:             150ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--border-2) transparent; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

@keyframes pageIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes spin   { to { transform: rotate(360deg); } }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  font-size: 13px;
  animation: pageIn 220ms ease both;
}

/* ── Topbar ── */
.topbar {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  height: 72px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  position: sticky; top: 0; z-index: 200;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-mark {
  width: 28px; height: 28px; background: #18181b;
  border: 1px solid #2e2e33;
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 16px; height: 16px; }
.logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.logo-text .lt-w { color: var(--text-1); }
.logo-text .lt-c { color: var(--accent); }
.nav-links {
  display: flex; align-items: center; gap: 20px;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-link {
  font-size: 13px; font-weight: 500; color: var(--text-3);
  text-decoration: none; padding-bottom: 2px;
  border-bottom: 1px solid transparent;
  transition: color var(--t), border-color var(--t);
  line-height: 72px;
}
.nav-link.active   { color: var(--text-1); border-bottom-color: var(--accent); }
.nav-link.inactive:hover { color: var(--text-2); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--green); background: var(--green-dim);
  border: 1px solid var(--green-border);
  padding: 2px 6px; border-radius: var(--r-sm);
}
.live-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); animation: blink 1.8s ease infinite; }
.topbar-link { font-size: 11px; color: var(--text-4); text-decoration: none; transition: color var(--t); }
.topbar-link:hover { color: var(--text-2); }

/* ── Layout ── */
.layout {
  display: flex;
  height: calc(100vh - 72px);
  padding: 12px 16px 12px;
  gap: 12px;
}

/* ── Tracker panel (left, scrollable) ── */
.tracker-panel {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
}

/* ── Performance Section (matches Autopilot) ── */
.perf-section-t {
  padding: 20px 24px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.perf-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px;
}
.perf-title-t {
  font-size: 20px; font-weight: 700; color: var(--text-1);
  letter-spacing: -0.02em;
}
.perf-cso { display: flex; gap: 28px; align-items: flex-start; }
.perf-cso-item { display: flex; flex-direction: column; gap: 2px; text-align: right; }
.perf-cso-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-4); font-family: 'JetBrains Mono', monospace;
}
.perf-cso-val {
  font-size: 22px; font-weight: 700; color: var(--text-1);
  font-family: 'JetBrains Mono', monospace; letter-spacing: -0.03em; line-height: 1;
}
.perf-cso-val.pos { color: var(--green); }
.perf-cso-val.neg { color: var(--red); }
.chart-wrap-t {
  height: 200px; position: relative;
  margin: 0 -24px; width: calc(100% + 48px);
}
#trackerChart { width: 100%; height: 100%; display: block; }
.chart-disclaimer { font-size: 10px; color: var(--text-4); padding: 8px 0 14px; font-style: italic; }

/* ── Calendar ── */
.cal-container {
  padding: 18px 20px 24px;
}
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.cal-header-left { display: flex; align-items: center; gap: 10px; }
.cal-month-label { font-size: 15px; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; }
.cal-nav-group { display: flex; gap: 3px; }
.cal-nav-btn {
  background: transparent; border: 1px solid var(--border-2);
  border-radius: var(--r-sm); color: var(--text-3);
  width: 26px; height: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all var(--t); line-height: 1;
}
.cal-nav-btn:hover { color: var(--text-1); background: #1d1d21; }
.cal-month-profit {
  font-size: 12px; color: var(--text-4);
  font-family: 'JetBrains Mono', monospace;
}
.cal-month-profit span { font-weight: 700; }
.cal-month-profit span.pos { color: var(--green); }
.cal-month-profit span.neg { color: var(--red); }
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 5px; margin-bottom: 5px;
}
.cal-weekday {
  font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text-4);
  text-align: center; padding: 4px 0;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}
.cal-day {
  min-height: 76px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #18181b;
  padding: 7px 9px;
  cursor: pointer;
  transition: transform 120ms ease, filter 120ms ease;
  display: flex; flex-direction: column;
  justify-content: space-between;
}
.cal-day:hover { transform: translateY(-2px); filter: brightness(1.12); }
.cal-empty { border: none !important; background: none !important; cursor: default; min-height: 76px; pointer-events: none; }
.cal-today { border: 2px solid rgba(34,211,238,0.55) !important; }
.cal-today .cal-day-num { color: var(--accent); font-weight: 700; }
.cal-selected { outline: 2px solid rgba(34,211,238,0.7); outline-offset: 2px; }
.cal-win  { background: #1a3d2b; border-color: #245c3e !important; }
.cal-loss { background: #3d1a1a; border-color: #5c2828 !important; }
.cal-push { background: #18181b; }
.cal-active-day { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.30) !important; }
.cal-win:hover, .cal-loss:hover { border-color: inherit !important; }
.cal-day-num { font-size: 11px; font-weight: 500; color: var(--text-4); line-height: 1; }
.cal-win  .cal-day-num, .cal-loss .cal-day-num { color: rgba(255,255,255,0.45); }
.cal-day-pnl { font-size: 22px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; color: rgba(255,255,255,0.92); }
.cal-day-pnl.active-label { font-size: 12px; font-weight: 600; color: var(--amber); letter-spacing: 0; }

/* ── Day detail ── */
.cal-detail { margin-top: 10px; border: 1px solid var(--border-2); border-radius: var(--r); background: var(--surface-2); overflow: hidden; animation: slideDown 180ms ease both; }
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.cal-detail-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.cal-detail-date { font-size: 14px; font-weight: 700; color: var(--text-1); letter-spacing: -0.01em; }
.cal-detail-summary { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-3); }
.cal-detail-close { background: none; border: none; cursor: pointer; color: var(--text-4); font-size: 16px; line-height: 1; padding: 2px 4px; transition: color var(--t); flex-shrink: 0; }
.cal-detail-close:hover { color: var(--text-2); }
.cal-detail-body { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 12px; }

/* Popup slip cards — larger & more readable */
.cal-slip { padding: 16px 18px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); display: flex; flex-direction: column; gap: 12px; }
.cal-slip.pp { border-color: var(--pp-border); box-shadow: 0 2px 12px var(--pp-glow); }
.cal-slip.ud { border-color: var(--ud-border); box-shadow: 0 2px 12px var(--ud-glow); }
.cal-slip-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.cal-slip-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.ptag-sm { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 3px 7px; border-radius: var(--r-sm); border: 1px solid var(--border-2); color: var(--text-3); }
.ptag-sm.pp { color: #a78bfa; border-color: var(--pp-border); background: rgba(124,58,237,0.08); }
.ptag-sm.ud { color: #fbbf24; border-color: var(--ud-border); background: rgba(217,119,6,0.08); }
.cal-slip-type { font-size: 11px; font-weight: 600; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.05em; }
.cal-slip-result-badge { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.cal-slip-pnl { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-4); white-space: nowrap; }
.cal-slip-legs { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
.cal-slip-leg { display: flex; align-items: center; justify-content: space-between; font-size: 13px; gap: 10px; }
.cal-slip-leg-name { color: var(--text-2); font-weight: 500; flex: 1; min-width: 0; }
.cal-slip-leg-name.hit  { color: var(--green); font-weight: 600; }
.cal-slip-leg-name.miss { color: var(--red); opacity: 0.8; text-decoration: line-through; }
.cal-slip-leg-detail { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-4); white-space: nowrap; }
.cal-detail-empty { padding: 28px; text-align: center; color: var(--text-4); font-size: 12px; }

/* ── Side panel ── */
.side-panel {
  width: 460px; flex-shrink: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── Slips card ── */
.slips-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex; flex-direction: column;
  overflow: hidden; flex: 1; min-height: 0;
}
.slips-header {
  padding: 0 14px;
  height: 44px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.slips-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-4); }
.slips-meta { display: flex; align-items: center; gap: 8px; }
.slips-tabs { display: flex; align-items: center; height: 100%; }
.stab {
  font-size: 11px; font-weight: 500;
  padding: 0; margin-left: 14px;
  height: 100%; border: none; background: none;
  color: var(--text-3); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color var(--t), border-color var(--t);
}
.stab:first-child { margin-left: 0; }
.stab.on { color: var(--text-1); border-bottom-color: var(--accent); }
.slips-body { overflow-y: auto; flex: 1; padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; }

/* ── dg-card (Autopilot-style slip cards) ── */
.dg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color var(--t);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.dg-card.pp { border-color: var(--pp-border); box-shadow: 0 0 0 1px rgba(124,58,237,0.10), 0 4px 20px var(--pp-glow); }
.dg-card.ud { border-color: var(--ud-border); box-shadow: 0 0 0 1px rgba(217,119,6,0.10), 0 4px 20px var(--ud-glow); }
.dg-card.hit  { border-left: 3px solid var(--green); }
.dg-card.miss { border-left: 3px solid var(--red); }

.dg-body { display: flex; align-items: stretch; }

/* Left platform panel */
.dg-plat {
  width: 90px; flex-shrink: 0;
  padding: 16px 10px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  background: rgba(0,0,0,0.20);
}
.dg-plat img { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; display: block; }
.dg-stake { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; }
.dg-type-lbl { font-size: 10px; color: var(--text-4); text-align: center; }

/* Table area */
.dg-tbl { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.dg-hrow {
  display: grid;
  grid-template-columns: 1fr 62px 40px 66px;
  padding: 6px 12px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
  align-items: center;
}
.dg-th { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-4); font-family: 'JetBrains Mono', monospace; }
.dg-row {
  display: grid;
  grid-template-columns: 1fr 62px 40px 66px;
  padding: 10px 12px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.dg-row:last-of-type { border-bottom: none; }
.dg-row.hit  { background: rgba(34,197,94,0.04); }
.dg-row.miss { background: rgba(239,68,68,0.04); }

/* Player cell */
.dg-pcol { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.dg-pname { font-size: 13px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dg-pname.hit  { color: var(--green); }
.dg-pname.miss { color: var(--red); opacity: 0.85; }
.dg-pname.void { color: var(--text-4); }
.dg-pprob { font-size: 11px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 4px; }
.psc-delta { font-size: 10px; font-weight: 600; }
.psc-delta.up { color: var(--green); }
.psc-delta.dn { color: var(--red); }
.psc-delta.fl { color: var(--text-4); }

/* Stat, Line cells */
.dg-stat { display: flex; align-items: center; }
.dg-stat-name { font-size: 11px; font-weight: 600; color: var(--text-2); }
.dg-line { display: flex; align-items: center; }
.dg-lineval { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text-1); letter-spacing: -0.02em; }

/* Pick button (single, read-only) */
.dg-ou { display: flex; align-items: center; }
.dg-btn {
  flex: 1; padding: 6px 0; text-align: center;
  font-size: 11px; font-weight: 600;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: var(--surface-2);
  color: var(--text-4);
  cursor: default;
  font-family: 'Inter', sans-serif;
}
.dg-btn.on         { background: rgba(34,197,94,0.14); border-color: var(--green-border); color: var(--green); }
.dg-btn.on.hit     { background: var(--green-dim); border-color: var(--green-border); color: var(--green); }
.dg-btn.on.miss    { background: var(--red-dim);   border-color: var(--red-border);   color: var(--red); }
.dg-btn.on.void    { background: rgba(113,113,122,0.12); border-color: rgba(113,113,122,0.30); color: #71717a; }

/* Right EV panel */
.dg-ev {
  width: 72px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 12px 6px;
  background: rgba(0,0,0,0.20);
}
.dg-ev-val { font-size: 17px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.03em; text-align: center; line-height: 1; }
.dg-ev-val.pos { color: var(--green); }
.dg-ev-val.neg { color: var(--red); }
.dg-ev-val.neu { color: var(--text-3); }
.dg-ev-lbl { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-4); font-family: 'JetBrains Mono', monospace; }

/* Card footer */
.dg-footer {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface-2);
}
.dg-result { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.dg-result.hit    { color: var(--green); }
.dg-result.miss   { color: var(--red); }
.dg-result.refund { color: var(--text-4); }
.dg-active-badge { font-size: 10px; font-weight: 600; color: var(--amber); font-family: 'JetBrains Mono', monospace; }
.settle-btn {
  font-size: 10px; font-weight: 500; color: var(--text-4);
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 3px 8px; cursor: pointer;
  transition: color var(--t), border-color var(--t);
  font-family: 'JetBrains Mono', monospace;
}
.settle-btn:hover { color: var(--text-2); border-color: var(--border-2); }

/* Prob classes */
.prob-green  { color: #4ade80; }
.prob-red    { color: #f87171; }
.prob-neutral{ color: var(--text-3); }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 16px; gap: 5px; text-align: center; }
.e-title { font-size: 12px; font-weight: 500; color: var(--text-4); }
.e-sub   { font-size: 11px; color: var(--text-4); }

/* ── Settle modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border-2);
  border-radius: 10px; padding: 20px; width: 340px; max-width: 95vw;
}
.modal-title { font-size: 13px; font-weight: 600; color: var(--text-1); margin-bottom: 14px; }
.modal-leg { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.modal-leg-name { font-size: 11px; color: var(--text-2); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.leg-btns { display: flex; gap: 4px; flex-shrink: 0; }
.leg-btn {
  font-size: 10px; font-weight: 600; padding: 3px 8px;
  border-radius: var(--r-sm); border: 1px solid var(--border-2);
  background: transparent; color: var(--text-3); cursor: pointer;
  transition: all 150ms ease; font-family: 'JetBrains Mono', monospace;
}
.leg-btn:hover { color: var(--text-1); }
.leg-btn.hit.sel  { background: var(--green-dim);  border-color: var(--green-border);  color: var(--green); }
.leg-btn.miss.sel { background: var(--red-dim);    border-color: var(--red-border);    color: var(--red); }
.leg-btn.void.sel { background: rgba(113,113,122,0.12); border-color: rgba(113,113,122,0.3); color: #a1a1aa; }
.modal-result { margin: 14px 0 16px; padding: 8px 10px; border-radius: var(--r); background: var(--surface-2); border: 1px solid var(--border); font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
.modal-result span { font-weight: 600; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-cancel { font-size: 12px; font-weight: 500; color: var(--text-3); background: transparent; border: 1px solid var(--border-2); border-radius: var(--r); padding: 6px 14px; cursor: pointer; transition: color var(--t); }
.modal-cancel:hover { color: var(--text-1); }
.modal-confirm { font-size: 12px; font-weight: 600; color: #0f0f11; background: var(--accent); border: none; border-radius: var(--r); padding: 6px 14px; cursor: pointer; transition: opacity var(--t); }
.modal-confirm:hover { opacity: 0.85; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--surface-2); color: var(--text-1);
  padding: 8px 16px; border-radius: var(--r);
  border: 1px solid var(--border-2);
  font-size: 12px; font-weight: 500;
  z-index: 999; transition: transform 0.25s ease;
  white-space: nowrap;
}
.toast.show  { transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--red-border); color: var(--red); }
.spin { width: 14px; height: 14px; border: 2px solid var(--border-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
</head>
<body>

        <path d="M17.5 9.5L3 4.5v4l5 1.5-5 1.5v4l14.5-5c.33-.11.33-.89 0-1z" fill="#22d3ee"/>
      </svg>
    </div>
    <div class="logo-text"><span class="lt-w">Prop</span><span class="lt-c">ilot</span></div>
  </div>
  <div class="nav-links">

<div class="layout">

  <!-- ── Tracker panel (left) ── -->
  <div class="tracker-panel">

    <!-- Performance Section -->
    <div class="perf-section-t">

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let yourSlips        = { active: [], settled: [] };
let slipTab          = 'active';
let calYear          = new Date().getFullYear();
let calMonth         = new Date().getMonth();
let selectedDay      = null;
let settleSlip       = null;
let settleLegResults = [];

const PROB_THRESHOLD = { PP: 54.2, UD: 53.5 };
function probClass(p, platform) {
  const t = PROB_THRESHOLD[platform] ?? 53.5;
  if (p >= t)       return 'prob-green';
  if (p >= t - 0.5) return 'prob-neutral';
  return 'prob-red';
}

function parseDet(detail) {
  const m = (detail || '').match(/^(OVER|UNDER)\s+([\d.]+)\s+(.+)$/i);
  if (m) return { dir: m[1].toUpperCase(), line: m[2], stat: m[3].toUpperCase() };
  return { dir: '—', line: '—', stat: detail || '—' };
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2500);
}

// ── Performance Stats ─────────────────────────────────────────────────────────
function updateStats(d) {
  const settled     = yourSlips.settled || [];
  const nonRefund   = settled.filter(s => s.result && s.result !== 'refund');
  const totalProfit = nonRefund.reduce((acc, s) => acc + (s.profit != null ? parseFloat(s.profit) : 0), 0);
  const hits        = nonRefund.filter(s => s.result.startsWith('hit')).length;
  const misses      = nonRefund.filter(s => s.result === 'miss').length;
  const totalStaked = nonRefund.reduce((acc, s) => acc + parseFloat(s.stake || 5), 0);
  const roi         = totalStaked > 0 ? (totalProfit / totalStaked * 100) : null;

  const mainEl = document.getElementById('pnlMain');
  if (mainEl) {
    mainEl.textContent = nonRefund.length ? `${totalProfit >= 0 ? '+' : ''}$${Math.abs(totalProfit).toFixed(2)}` : '—';
    mainEl.className   = 'perf-cso-val' + (totalProfit > 0 ? ' pos' : totalProfit < 0 ? ' neg' : '');
  }

  const recEl = document.getElementById('pnlRecord');
  if (recEl) recEl.textContent = nonRefund.length ? `${hits}W-${misses}L` : '—';

  const roiEl = document.getElementById('pnlRoi');
  if (roiEl) {
    roiEl.textContent = roi != null ? `${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%` : '—';
    roiEl.className   = 'perf-cso-val' + (roi > 0 ? ' pos' : roi < 0 ? ' neg' : '');
  }
}

// ── Calendar ─────────────────────────────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  selectedDay = null;
  document.getElementById('calDetail').style.display = 'none';
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${MONTHS_SHORT[calMonth]} ${calYear}`;

  const dayMap = {}, activeMap = {};

  (yourSlips.settled || []).forEach(s => {
    const ds = (s.created_at || '').split(' ')[0];
    if (!ds) return;
    if (!dayMap[ds]) dayMap[ds] = { slips: [], profit: 0, hits: 0, misses: 0 };
    dayMap[ds].slips.push(s);
    if (s.profit != null && s.result !== 'refund') dayMap[ds].profit += parseFloat(s.profit);
    if (s.result && s.result.startsWith('hit')) dayMap[ds].hits++;
    else if (s.result === 'miss') dayMap[ds].misses++;
  });
  (yourSlips.active || []).forEach(s => {
    const ds = (s.created_at || '').split(' ')[0];
    if (!ds) return;
    if (!activeMap[ds]) activeMap[ds] = [];
    activeMap[ds].push(s);
  });

  const monthPrefix  = `${calYear}-${String(calMonth + 1).padStart(2, '0')}`;
  let monthTotal = 0;
  for (const [ds, d] of Object.entries(dayMap)) {
    if (ds.startsWith(monthPrefix)) monthTotal += d.profit;
  }
  const profEl = document.getElementById('calTotalProfit');
  if (profEl) {
    if (Object.keys(dayMap).some(ds => ds.startsWith(monthPrefix))) {
      profEl.textContent = `${monthTotal >= 0 ? '+' : '-'}$${Math.abs(monthTotal).toFixed(2)}`;
      profEl.className   = monthTotal >= 0 ? 'pos' : 'neg';
    } else {
      profEl.textContent = '—'; profEl.className = '';
    }
  }

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today       = new Date();
  const isThisMonth = today.getFullYear() === calYear && today.getMonth() === calMonth;

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day cal-empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const mm  = String(calMonth + 1).padStart(2, '0');
    const dd  = String(d).padStart(2, '0');
    const ds  = `${calYear}-${mm}-${dd}`;
    const isToday = isThisMonth && today.getDate() === d;
    const dayData = dayMap[ds];
    const activeDay = activeMap[ds];
    const isSel = selectedDay === ds;

    let colorClass = '', innerHtml = '';
    if (dayData && dayData.slips.length > 0) {
      const p = dayData.profit;
      colorClass = p > 0.005 ? 'cal-win' : p < -0.005 ? 'cal-loss' : 'cal-push';
      const pColor = p > 0.005 ? 'var(--green)' : p < -0.005 ? 'var(--red)' : 'rgba(255,255,255,0.6)';
      const pSign  = p > 0.005 ? '+' : p < -0.005 ? '-' : '';
      innerHtml = `<div class="cal-day-pnl" style="color:${pColor}">${pSign}$${Math.abs(p) < 1 ? Math.abs(p).toFixed(2) : Math.round(Math.abs(p))}</div>`;
    } else if (activeDay && activeDay.length > 0) {
      colorClass = 'cal-active-day';
      innerHtml  = `<div class="cal-day-pnl active-label">${activeDay.length} active</div>`;
    }

    const classes = ['cal-day', colorClass, isToday ? 'cal-today' : '', isSel ? 'cal-selected' : ''].filter(Boolean).join(' ');
    html += `<div class="${classes}" onclick="selectDay('${ds}')"><div class="cal-day-num">${d}</div>${innerHtml}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  if (selectedDay) renderDayDetail(selectedDay);
}

function selectDay(ds) {
  if (selectedDay === ds) { selectedDay = null; document.getElementById('calDetail').style.display = 'none'; renderCalendar(); return; }
  selectedDay = ds;
  renderCalendar();
  renderDayDetail(ds);
}

function renderDayDetail(ds) {
  const detailEl = document.getElementById('calDetail');
  const allSlips = [
    ...(yourSlips.settled || []).filter(s => (s.created_at || '').startsWith(ds)),
    ...(yourSlips.active  || []).filter(s => (s.created_at || '').startsWith(ds)),
  ];
  const [y, m, d] = ds.split('-');
  const label = `${MONTHS_SHORT[parseInt(m) - 1]} ${parseInt(d)}, ${y}`;

  if (!allSlips.length) { detailEl.style.display = 'none'; return; }

  const settled   = allSlips.filter(s => s.result);
  const dayProfit = settled.reduce((acc, s) => acc + (s.profit != null && s.result !== 'refund' ? parseFloat(s.profit) : 0), 0);
  const dayHits   = settled.filter(s => s.result && s.result.startsWith('hit')).length;
  const dayMisses = settled.filter(s => s.result === 'miss').length;
  const profStr   = dayProfit >= 0
    ? `<span style="color:var(--green)">+$${dayProfit.toFixed(2)}</span>`
    : `<span style="color:var(--red)">-$${Math.abs(dayProfit).toFixed(2)}</span>`;
  const sp = [];
  if (settled.length)              sp.push(`${dayHits}W ${dayMisses}L`);
  if (allSlips.filter(s=>!s.result).length) sp.push(`${allSlips.filter(s=>!s.result).length} active`);

  const slipsHtml = allSlips.map(s => {
    const platCls = s.platform === 'PP' ? 'pp' : 'ud';
    let resultHtml = s.result
      ? `<span class="cal-slip-result-badge" style="color:${s.result.startsWith('hit')?'var(--green)':s.result==='miss'?'var(--red)':'var(--text-4)'}">${s.result.toUpperCase()}${s.profit!=null?` · ${s.profit>=0?'+':''}$${parseFloat(s.profit).toFixed(2)}`:''}</span>`
      : `<span style="font-size:10px;color:var(--amber);font-family:'JetBrains Mono',monospace;">ACTIVE</span>`;
    const legsHtml = s.players.map((p, i) => {
      const lr = s.leg_results ? s.leg_results[i] : null;
      const lrC = lr==='hit'?'hit':lr==='miss'?'miss':'';
      const sym = lr==='hit'?' ✓':lr==='miss'?' ✗':'';
      return `<div class="cal-slip-leg"><span class="cal-slip-leg-name ${lrC}">${p}${sym}</span><span class="cal-slip-leg-detail">${s.details[i]}</span></div>`;
    }).join('');
    return `<div class="cal-slip ${platCls}"><div class="cal-slip-head"><div class="cal-slip-left"><span class="ptag-sm ${platCls}">${s.platform}</span><span class="cal-slip-type">${s.type}</span>${resultHtml}</div><div class="cal-slip-pnl">EV ${s.ev_pct!=null?(s.ev_pct>=0?'+':'')+parseFloat(s.ev_pct).toFixed(1)+'%':'—'}</div></div><div class="cal-slip-legs">${legsHtml}</div></div>`;
  }).join('');

  detailEl.style.display = 'block';
  detailEl.innerHTML = `<div class="cal-detail"><div class="cal-detail-header"><div class="cal-detail-date">${label}</div><div class="cal-detail-summary">${sp.join(' · ')} &nbsp;${settled.length?profStr:''}</div><button class="cal-detail-close" onclick="closeDetail()">✕</button></div><div class="cal-detail-body">${slipsHtml||'<div class="cal-detail-empty">No slips this day</div>'}</div></div>`;
}

function closeDetail() {
  selectedDay = null;
  document.getElementById('calDetail').style.display = 'none';
  renderCalendar();
}

// ── Chart (matches Autopilot structure) ──────────────────────────────────────
function renderChart() {
  const settled = yourSlips.settled || [];
  const svg  = document.getElementById('trackerChart');
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const W    = Math.max(rect.width || svg.parentElement.offsetWidth, 300);
  const H    = rect.height || 200;
  const PAD  = { top: 20, right: 20, bottom: 20, left: 62 };
  const iW   = W - PAD.left - PAD.right;
  const iH   = H - PAD.top - PAD.bottom;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  if (!settled.length) {
    svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" dominant-baseline="middle" fill="#3f3f46" font-size="12" font-family="Inter,sans-serif">No settled slips yet</text>`;
    return;
  }

  const sorted = [...settled].filter(s => s.settled_at || s.created_at)
    .sort((a, b) => (a.settled_at||a.created_at||'').localeCompare(b.settled_at||b.created_at||''));

  const pts = [{ idx: 0, val: 0 }];
  let cum = 0;
  sorted.forEach((s, i) => {
    if (s.result && s.result !== 'refund' && s.profit != null) cum += parseFloat(s.profit);
    pts.push({ idx: i + 1, val: cum });
  });

  const maxV  = Math.max(0, ...pts.map(p => p.val));
  const minV  = Math.min(0, ...pts.map(p => p.val));
  const range = (maxV - minV) || 1;
  const n     = pts.length;
  const toX   = i => PAD.left + (i / (n - 1 || 1)) * iW;
  const toY   = v => PAD.top + iH - ((v - minV) / range) * iH;
  const zeroY = toY(0);

  const step  = Math.max(1, Math.ceil(range / 4));
  const yVals = [];
  for (let v = Math.floor(minV / step) * step; v <= maxV + step * 0.5; v += step) {
    if (v >= minV - step * 0.1 && v <= maxV + step * 0.1) yVals.push(Math.round(v));
  }
  if (!yVals.includes(0)) yVals.push(0);

  const finalVal  = pts[pts.length - 1].val;
  const lineColor = finalVal >= 0 ? '#22c55e' : '#ef4444';
  const pathD = pts.map((p, i) => `${i===0?'M':'L'}${toX(p.idx).toFixed(1)},${toY(p.val).toFixed(1)}`).join(' ');
  const fillD = `${pathD} L${toX(n-1).toFixed(1)},${zeroY.toFixed(1)} L${toX(0).toFixed(1)},${zeroY.toFixed(1)} Z`;

  svg.innerHTML = `
    <defs>
      <linearGradient id="tcg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="${lineColor}" stop-opacity="0.20"/>
        <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.01"/>
      </linearGradient>
      <clipPath id="tcc"><rect x="${PAD.left}" y="${PAD.top}" width="${iW}" height="${iH}"/></clipPath>
    </defs>
    ${yVals.map(v => {
      const y = toY(v).toFixed(1);
      return `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}"
        stroke="${v===0?'#2e2e33':'#1c1c1f'}" stroke-width="${v===0?1:0.5}"/>
        <text x="${PAD.left-6}" y="${(parseFloat(y)+4).toFixed(1)}" text-anchor="end"
          fill="#3f3f46" font-size="10" font-family="JetBrains Mono,monospace">${v>=0?'+':''}$${v}</text>`;
    }).join('')}
    <path d="${fillD}" fill="url(#tcg)" clip-path="url(#tcc)"/>
    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="1.8"
      stroke-linejoin="round" stroke-linecap="round" clip-path="url(#tcc)"/>
    <circle cx="${toX(n-1).toFixed(1)}" cy="${toY(finalVal).toFixed(1)}" r="3.5"
      fill="${lineColor}" stroke="#0f0f11" stroke-width="1.5"/>
  `;
}

let _chartResize;
window.addEventListener('resize', () => { clearTimeout(_chartResize); _chartResize = setTimeout(renderChart, 120); });

// ── Slips panel ───────────────────────────────────────────────────────────────
function setSlipTab(tab) {
  slipTab = tab;
  document.getElementById('stActive').className  = 'stab' + (tab === 'active'  ? ' on' : '');
  document.getElementById('stResults').className = 'stab' + (tab === 'results' ? ' on' : '');
  renderSlips();
}

function renderSlips() {
  const el   = document.getElementById('slipsBody');
  const list = slipTab === 'active' ? yourSlips.active : yourSlips.settled;

  if (!list.length) {
    const msg = slipTab === 'active' ? 'No active slips' : 'No results yet';
    const sub = slipTab === 'active' ? 'Build one on the Edge Feed' : 'Active slips settle automatically';
    el.innerHTML = `<div class="empty"><div class="e-title">${msg}</div><div class="e-sub">${sub}</div></div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const platCls  = s.platform === 'PP' ? 'pp' : 'ud';
    const resultCls = s.result ? (s.result.startsWith('hit') ? 'hit' : s.result === 'miss' ? 'miss' : '') : '';
    const evPct    = s.ev_pct != null ? `${s.ev_pct > 0 ? '+' : ''}${parseFloat(s.ev_pct).toFixed(1)}%` : '—';
    const evClass  = s.ev_pct != null && s.ev_pct >= 0 ? 'pos' : 'neg';

    const legRows = s.players.map((p, i) => {
      const det   = parseDet(s.details[i]);
      const prob  = s.current_probs[i];
      const added = s.added_probs[i];
      const diff  = parseFloat((prob - added).toFixed(1));
      const dc    = diff > 0 ? 'up' : diff < 0 ? 'dn' : 'fl';
      const ds    = diff > 0 ? `↑${diff}%` : diff < 0 ? `↓${Math.abs(diff)}%` : '→';
      const lr    = s.leg_results ? s.leg_results[i] : null;
      const lrCls = lr === 'hit' ? 'hit' : lr === 'miss' ? 'miss' : lr === 'void' ? 'void' : '';
      return `<div class="dg-row ${lrCls}">
        <div class="dg-pcol">
          <div class="dg-pname ${lrCls}">${p}</div>
          <div class="dg-pprob">
            <span class="${probClass(prob, s.platform)}">${prob}%</span>
            <span class="psc-delta ${dc}">${ds}</span>
          </div>
        </div>
        <div class="dg-stat"><span class="dg-stat-name">${det.stat}</span></div>
        <div class="dg-line"><span class="dg-lineval">${det.line}</span></div>
        <div class="dg-ou"><div class="dg-btn on ${lrCls}">${det.dir}</div></div>
      </div>`;
    }).join('');

    let footerHtml;
    if (s.result) {
      const profit = s.profit != null
        ? ` · ${s.profit >= 0 ? '+' : '-'}$${Math.abs(parseFloat(s.profit)).toFixed(2)}`
        : '';
      footerHtml = `<div class="dg-footer">
        <span class="dg-result ${resultCls}">${s.result.toUpperCase()}${profit}</span>
        <button class="settle-btn" onclick="event.stopPropagation();openSettle(${s.id})">⚙ Settle</button>
      </div>`;
    } else {
      footerHtml = `<div class="dg-footer">
        <span class="dg-active-badge">ACTIVE</span>
        <button class="settle-btn" onclick="event.stopPropagation();openSettle(${s.id})">⚙ Settle</button>
      </div>`;
    }

    return `<div class="dg-card ${platCls} ${resultCls}">
      <div class="dg-body">
        <div class="dg-plat">
          <img src="/static/${platCls}_logo.png" alt="${s.platform}">
          <div class="dg-stake">$${s.stake}</div>
          <div class="dg-type-lbl">${s.type}</div>
        </div>
        <div class="dg-tbl">
          <div class="dg-hrow">
            <div class="dg-th">Player</div>
            <div class="dg-th">Stat</div>
            <div class="dg-th">Line</div>
            <div class="dg-th">Pick</div>
          </div>
          ${legRows}
        </div>
        <div class="dg-ev">
          <div class="dg-ev-val ${evClass}">${evPct}</div>
          <div class="dg-ev-lbl">% EV</div>
        </div>
      </div>
      ${footerHtml}
    </div>`;
  }).join('');
}

// ── Settle modal ──────────────────────────────────────────────────────────────
const PAYOUTS = { PP: {2: 3.0, 3: 6.0}, UD: {2: 3.5, 3: 6.5} };

function openSettle(slipId) {
  const all  = [...yourSlips.active, ...yourSlips.settled];
  settleSlip = all.find(s => s.id === slipId);
  if (!settleSlip) return;
  settleLegResults = settleSlip.leg_results ? [...settleSlip.leg_results] : settleSlip.players.map(() => null);
  document.getElementById('modalTitle').textContent = `Settle · ${settleSlip.platform} ${settleSlip.type}`;
  document.getElementById('modalLegs').innerHTML = settleSlip.players.map((p, i) => `
    <div class="modal-leg" id="mleg-${i}">
      <span class="modal-leg-name">${p} — ${settleSlip.details[i]}</span>
      <div class="leg-btns">
        <button class="leg-btn hit  ${settleLegResults[i]==='hit' ?'sel':''}" onclick="setLeg(${i},'hit')">HIT</button>
        <button class="leg-btn miss ${settleLegResults[i]==='miss'?'sel':''}" onclick="setLeg(${i},'miss')">MISS</button>
        <button class="leg-btn void ${settleLegResults[i]==='void'?'sel':''}" onclick="setLeg(${i},'void')">VOID</button>
      </div>
    </div>`).join('');
  updateModalResult();
  document.getElementById('settleModal').classList.add('open');
}

function setLeg(i, val) {
  settleLegResults[i] = val;
  ['hit','miss','void'].forEach(t => {
    const btn = document.querySelector(`#mleg-${i} .leg-btn.${t}`);
    if (btn) btn.classList.toggle('sel', t === val);
  });
  updateModalResult();
}

function calcSettleResult() {
  if (settleLegResults.some(r => r === null)) return null;
  const s      = settleSlip;
  const stake  = parseFloat(s.stake || 5);
  const n      = settleLegResults.length;
  const hits   = settleLegResults.filter(r => r === 'hit').length;
  const misses = settleLegResults.filter(r => r === 'miss').length;
  const voids  = settleLegResults.filter(r => r === 'void').length;
  const active = n - voids;
  if (misses > 0)      return { result: 'miss',   payout: 0, profit: -stake };
  if (voids === n)     return { result: 'refund',  payout: stake, profit: 0 };
  if (hits === active) {
    const result = voids > 0 ? 'hit-2' : 'hit';
    const mult   = (PAYOUTS[s.platform] || {})[active] || 1;
    const payout = Math.round(stake * mult * 100) / 100;
    return { result, payout, profit: Math.round((payout - stake) * 100) / 100 };
  }
  return { result: 'miss', payout: 0, profit: -stake };
}

function updateModalResult() {
  const el  = document.getElementById('modalResult');
  const res = calcSettleResult();
  if (!res) { el.innerHTML = 'Select a result for each leg'; return; }
  const color  = res.result.startsWith('hit') ? 'var(--green)' : res.result === 'miss' ? 'var(--red)' : 'var(--text-3)';
  const profit = res.profit >= 0 ? `+$${res.profit.toFixed(2)}` : `-$${Math.abs(res.profit).toFixed(2)}`;
  el.innerHTML = `Result: <span style="color:${color}">${res.result.toUpperCase()}</span> &nbsp;·&nbsp; Payout: <span>$${res.payout.toFixed(2)}</span> &nbsp;·&nbsp; P&L: <span style="color:${color}">${profit}</span>`;
}

function closeSettle() {
  document.getElementById('settleModal').classList.remove('open');
  settleSlip = null;
}

async function confirmSettle() {
  const res = calcSettleResult();
  if (!res) return;
  try {
    const r = await fetch(`/api/your-slips/${settleSlip.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ leg_results: settleLegResults }),
    });
    const d = await r.json();
    if (d.ok) { closeSettle(); fetchData(); }
    else alert('Error: ' + (d.error || 'unknown'));
  } catch { alert('Network error'); }
}

document.getElementById('settleModal').addEventListener('click', function(e) { if (e.target === this) closeSettle(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('settleModal').classList.contains('open')) closeSettle(); });

// ── Data fetch ─────────────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const d   = await (await fetch('/api/your-slips')).json();
    yourSlips = { active: d.active || [], settled: d.settled || [] };
    updateStats(d);
    renderChart();
    renderCalendar();
    renderSlips();
  } catch {
    document.getElementById('slipsBody').innerHTML =
      '<div class="empty"><div class="e-title">Connection error</div></div>';
  }
}

// ── Nav transition ──────────────────────────────────────────────────────────
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', e => {
    if (link.href === window.location.href) return;
    e.preventDefault();
    Object.assign(document.body.style, { transition: 'opacity 150ms, transform 150ms', opacity: '0', transform: 'translateY(-4px)' });
    setTimeout(() => { window.location.href = link.href; }, 160);
  });
});

// ── Boot ────────────────────────────────────────────────────────────────────
fetchData();
setInterval(fetchData, 120000);
</script>
</body>
